site_name: ASP.Net Core
site_description: ASP.Net Core
site_author: MOGHA
docs_dir: docs

theme:
  name: material
  language: fa

  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - search.share

  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: حالت تاریک

    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: حالت روشن

  font:
    text: Vazirmatn
    code: JetBrains Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji

extra_css:
  - assets/extra.css

nav:
  - خانه: index.md

  - مقدمه و راه اندازی:
      - کامپیوتر چگونه کار می‌کند؟: "مقدمه و راه اندازی (Introduction & Environment Setup)/1. کامپیوتر چگونه کار می‌کند؟.md"
      - مقدمه‌ای بر زبان‌های برنامه‌نویسی: "مقدمه و راه اندازی (Introduction & Environment Setup)/2. مقدمه‌ای بر زبان‌های برنامه‌نویسی.md"
      - نحوه کار برنامه‌های کامپیوتری: "مقدمه و راه اندازی (Introduction & Environment Setup)/3. نحوه کار برنامه‌های کامپیوتری.md"
      - انواع مختلف کاربردها: "مقدمه و راه اندازی (Introduction & Environment Setup)/4. انواع مختلف کاربردها.md"
      - روش‌شناسی‌های برنامه‌نویسی: "مقدمه و راه اندازی (Introduction & Environment Setup)/5.روش‌شناسی‌های برنامه‌نویسی.md"
      - الگوریتم، شبه‌کد، برنامه‌ها و فلوچارت‌ها: "مقدمه و راه اندازی (Introduction & Environment Setup)/6. الگوریتم، شبه‌کد، برنامه‌ها و فلوچارت‌ها.md"
      - مقدمه‌ای بر چارچوب دات‌نت: "مقدمه و راه اندازی (Introduction & Environment Setup)/7. مقدمه‌ای بر چارچوب دات‌نت.md"
      - معماری و اجزای چارچوب دات نت: "مقدمه و راه اندازی (Introduction & Environment Setup)/8. معماری و اجزای چارچوب دات نت.md"
      - مقدمه‌ای بر زبان برنامه‌نویسی سی‌شارپ: "مقدمه و راه اندازی (Introduction & Environment Setup)/9. مقدمه‌ای بر زبان برنامه‌نویسی سی‌شارپ.md"
      - نقشه راه توسعه‌دهندگان دات‌نت برای سال 2025: "مقدمه و راه اندازی (Introduction & Environment Setup)/10. نقشه راه توسعه‌دهندگان دات‌نت برای سال 2025.md"
      - بهترین روش‌های استاندارد کدنویسی: "مقدمه و راه اندازی (Introduction & Environment Setup)/11. بهترین روش‌های استاندارد کدنویسی.md"
  
  - C#:
    - مقدمه سی شارپ (C#.NET Basics):
      - ساختار اولیه برنامه سی شارپ: "C#/مقدمه سی شارپ (C#.NET Basics)/1 .ساختار اولیه برنامه سی شارپ.md"
