      - لیترال‌ها در سی شارپ: "C#/مقدمه سی شارپ (C#.NET Basics)/4. لیترال‌ها در سی شارپ.md"
      - تبدیل نوع در سی شارپ: "C#/مقدمه سی شارپ (C#.NET Basics)/5. تبدیل نوع در سی شارپ.md"
